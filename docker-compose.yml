# ---------------------------------------------------------------------------
# Text-to-Speech App — Docker Compose
#
# Serviços:
#   app      — Next.js UI (frontend, build local)
#
# Nota: O Pocket TTS server deve ser iniciado separadamente no host:
#   pocket-tts serve --host 0.0.0.0 --port 8001 --language portuguese
#
# Uso:
#   docker compose up -d          # Inicia o frontend (build automático)
#   docker compose down           # Para e remove containers
# ---------------------------------------------------------------------------

services:
  # -----------------------------------------------------------------------
  # Next.js UI — Frontend da aplicação
  # -----------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_TTS_SERVER_URL: http://host.docker.internal:8001
    container_name: tts-app
    ports:
      - "3001:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NEXT_PUBLIC_TTS_SERVER_URL=http://host.docker.internal:8001
      - NEXT_PUBLIC_DEFAULT_VOICE=rafael
      - NEXT_PUBLIC_DEFAULT_LANGUAGE=portuguese
      - NODE_ENV=production
    restart: unless-stopped
